// Build badge chips for a subtask (date, priority, labels)
function buildSubtaskChips(s) {
  let html = '';
  if (s.due_date) {
    const d = new Date(s.due_date + 'T00:00:00');
    const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const time = s.due_time ? ` ${fmtTime(s.due_time)}` : '';
    html += `<span class="subtask-chip subtask-chip-date">📅 ${label}${time}</span>`;
  }
  if (s.priority === 'high') html += `<span class="subtask-chip subtask-chip-high">↑ High</span>`;
  if (s.priority === 'low')  html += `<span class="subtask-chip subtask-chip-low">↓ Low</span>`;
  (s.labels || []).forEach(l => {
    html += `<span class="subtask-chip subtask-chip-label">@${escH(l)}</span>`;
  });
  return html;
}

function fmtTime(t) {
  const [h, m] = t.split(':').map(Number);
  return `${h % 12 || 12}:${String(m).padStart(2,'0')}${h >= 12 ? 'pm' : 'am'}`;
}

let _subtaskNlpTimer = null;
async function previewSubtaskNlp(text, taskId) {
  clearTimeout(_subtaskNlpTimer);
  const chips = document.getElementById('subtaskNlpChips');
  if (!chips) return;
  if (!text.trim()) { chips.innerHTML = ''; return; }
  _subtaskNlpTimer = setTimeout(async () => {
    try {
      const r = await api('/nlp/parse', 'POST', { text });
      if (!r) return;
      let html = '';
      if (r.due_date) {
        const d = new Date(r.due_date + 'T00:00:00');
        const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const time = r.due_time ? ` ${fmtTime(r.due_time)}` : '';
        html += `<span class="task-chip chip-date">📅 ${label}${time}</span>`;
      }
      if (r.priority === 'high') html += `<span class="task-chip chip-high">↑ High</span>`;
      if (r.priority === 'low')  html += `<span class="task-chip chip-low">↓ Low</span>`;
      (r.labels || []).forEach(l => {
        html += `<span class="task-chip chip-label">@${escH(l)}</span>`;
      });
      chips.innerHTML = html;
    } catch(e) {}
  }, 300);
}

async function addSubtask(taskId) {
  const input = document.getElementById('newSubtask');
  const title = input.value.trim(); if (!title) return;
  const sub = await api(`/tasks/${taskId}/subtasks`, 'POST', { title });
  if (sub) {
    input.value = '';
    const chipsEl = document.getElementById('subtaskNlpChips');
    if (chipsEl) chipsEl.innerHTML = '';
    const list = document.getElementById('subtaskList');
    const div  = document.createElement('div');
    div.className = 'subtask-item'; div.id = `sub-${sub.id}`;
    const chips = buildSubtaskChips(sub);
    div.innerHTML = `
      <div class="subtask-check" onclick="toggleSubtask('${taskId}','${sub.id}',true)"></div>
      <span class="subtask-title">${escH(sub.title)}</span>
      ${chips ? `<div class="subtask-chips">${chips}</div>` : ''}
      <span class="subtask-del" onclick="deleteSubtask('${taskId}','${sub.id}')">×</span>`;
    list.appendChild(div);
    if (sub.nlp_summary) toast(`✓ ${sub.nlp_summary}`);
    input.focus();
  }
}

async function toggleSubtask(taskId, subId, completed) {
  await api(`/tasks/${taskId}/subtasks/${subId}`,'PATCH',{completed});

  if (el) {
    const check = el.querySelector('.subtask-check');
    const title = el.querySelector('.subtask-title');
    check.classList.toggle('checked', completed); title.classList.toggle('done', completed);
    check.onclick = () => toggleSubtask(taskId, subId, !completed);
  }
}

async function deleteSubtask(taskId, subId) {
  await api(`/tasks/${taskId}/subtasks/${subId}`,'DELETE');

  const name = document.getElementById('editProjectName').value.trim();
  if (!name) return;
  await api(`/projects/${pid}`, 'PATCH', { name, icon: state.editProjectIcon });
  hideEditProject(); toast('✓ Project updated');
  await loadProjects(); renderSidebar(); renderContent();
}

async function deleteCurrentProject() {
  const pid = state.editingProjectId;
  if (!pid) return;
  showConfirm('Delete project? Tasks will move to Inbox.', async () => {
    await api(`/projects/${pid}`, 'DELETE');
    hideEditProject(); toast('Project deleted');
    state.currentSpecial = 'inbox';
    await loadProjects(); await loadTasks(); renderSidebar(); renderContent();
  });
}

// ── TOAST ──
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showConfirm(msg, onOk) {
  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-sheet">
      <div class="confirm-msg">${escH(msg)}</div>
      <div class="confirm-actions">
        <button class="confirm-cancel">Cancel</button>
        <button class="confirm-ok">Delete</button>
      </div>
    </div>`;
  overlay.querySelector('.confirm-cancel').onclick = () => overlay.remove();
  overlay.querySelector('.confirm-ok').onclick = () => { overlay.remove(); onOk(); };
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  document.body.appendChild(overlay);
}

// ── UTILS ──
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── NOTIFICATIONS ──
const NOTIF_KEY = 'td-notified';

function getNotified() {
  try { return new Set(JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]')); } catch { return new Set(); }
}
function markNotified(key) {
  const s = getNotified(); s.add(key);
  localStorage.setItem(NOTIF_KEY, JSON.stringify([...s].slice(-500)));
}

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

function fireNotification(task, label) {
  const timeStr = task.due_time ? ` at ${fmtTime(task.due_time)}` : '';
  const n = new Notification(`⏰ ${task.title}`, {
    body: `${label}${timeStr}`,
    icon: '/icons/icon-192.png',
    tag: `td-${task.id}`,
    requireInteraction: true,
  });
  n.onclick = () => { window.focus(); openDetail(task.id); n.close(); };
}

function showInAppAlert(task, label) {
  const timeStr = task.due_time ? ` at ${fmtTime(task.due_time)}` : '';
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;top:70px;left:50%;transform:translateX(-50%);
    background:var(--amber);color:#000;border-radius:12px;padding:12px 18px;
    font-size:14px;font-weight:600;z-index:9999;cursor:pointer;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);max-width:320px;text-align:center;
    animation:toastIn 0.3s cubic-bezier(0.34,1.2,0.64,1);`;
  el.innerHTML = `⏰ <strong>${escH(task.title)}</strong><br><span style="font-weight:400;font-size:12px">${label}${timeStr}</span>`;
  el.onclick = () => { openDetail(task.id); el.remove(); };
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 15000);
}

async function checkDueNotifications() {
  let tasks;
  try { tasks = await api('/tasks'); } catch { return; }
  if (!tasks) return;
  const now = new Date();
  const notified = getNotified();

  tasks.forEach(task => {
    if (task.status === 'done') return;
    if (!task.due_date) return;

    // Build due datetime
    let dueMs;
    if (task.due_time) {
      dueMs = new Date(`${task.due_date}T${task.due_time}`).getTime();
    } else {
      dueMs = new Date(`${task.due_date}T09:00:00`).getTime();
    }

    const diffMin = (dueMs - now.getTime()) / 60000;

    // 5-min warning key
    const warnKey = `${task.id}:${task.due_date}:${task.due_time||''}:warn`;
    // Due/overdue key
    const dueKey  = `${task.id}:${task.due_date}:${task.due_time||''}:due`;

    const di = formatDate(task.due_date);
    const dateLabel = di ? di.label : task.due_date;

    // 5-minute warning (between 6 and 4 min before)
    if (diffMin <= 6 && diffMin >= 4 && !notified.has(warnKey)) {
      const msg = Notification.permission === 'granted'
        ? fireNotification(task, `Due in 5 minutes — ${dateLabel}`)
        : showInAppAlert(task, `Due in 5 minutes — ${dateLabel}`);
      markNotified(warnKey);
    }

    // At due time (between +2 min before and 60 min after — catches missed polls)
    if (diffMin <= 2 && diffMin >= -60 && !notified.has(dueKey)) {
      if (Notification.permission === 'granted') {
        fireNotification(task, diffMin < 0 ? `Overdue — ${dateLabel}` : `Due now — ${dateLabel}`);
      } else {
        showInAppAlert(task, diffMin < 0 ? `Overdue — ${dateLabel}` : `Due now — ${dateLabel}`);
      }
      markNotified(dueKey);
    }
  });
}

function updateNotifBellUI(permission) {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  if (permission === 'granted')  { btn.textContent = '🔔'; btn.title = 'Notifications on'; btn.style.opacity = '0.5'; }
  if (permission === 'denied')   { btn.textContent = '🔕'; btn.title = 'Notifications blocked in browser settings'; }
  if (permission === 'default')  { btn.textContent = '🔔'; btn.title = 'Click to enable notifications'; btn.style.opacity = '1'; }
}

async function toggleNotifications() {
  if (!('Notification' in window)) { toast('Notifications not supported in this browser'); return; }
  if (Notification.permission === 'denied') {
    toast('Notifications blocked — enable in browser site settings');
    return;
  }
  const granted = await requestNotifPermission();
  updateNotifBellUI(Notification.permission);
  if (granted) {
    toast('✓ Notifications enabled');
    checkDueNotifications();
    if (!_notifInterval) _notifInterval = setInterval(checkDueNotifications, 60000);
  }
}

let _notifInterval = null;
async function initNotifications() {
  if (!('Notification' in window)) return;
  updateNotifBellUI(Notification.permission);
  if (Notification.permission === 'granted') {
    checkDueNotifications();
    _notifInterval = setInterval(checkDueNotifications, 60000);
  }
  // If already granted no need to prompt — user can click bell to enable
}

// ── SHARE TARGET ──
// Intercepts incoming shares from iOS/Android share sheet
function handleIncomingShare() {
  const params = new URLSearchParams(window.location.search);
  const shareTitle = params.get('share_title') || '';
  const shareText  = params.get('share_text')  || '';
  const shareUrl   = params.get('share_url')   || '';

  if (!shareTitle && !shareText && !shareUrl) return;

  // Build a smart pre-fill string
  // If there's a URL, format it nicely: "Page Title — https://..."
  let prefill = '';
  if (shareTitle && shareUrl) {
    prefill = `${shareTitle} — ${shareUrl}`;
  } else if (shareTitle && shareText) {
    prefill = `${shareTitle}: ${shareText}`;
  } else {
    prefill = shareTitle || shareText || shareUrl;
  }

  // Clean the URL so refreshing doesn't re-trigger
  window.history.replaceState({}, '', '/');

  // Open FAB with pre-filled text after app has initialised
  setTimeout(() => {
    openFab();
    const input = document.getElementById('fabInput');
    if (input) {
      input.value = prefill;
      // Trigger NLP preview
      input.dispatchEvent(new Event('input'));
      // Place cursor at end
      input.setSelectionRange(prefill.length, prefill.length);
    }
  }, 400);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetail(); closeFab(); }
  if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); openFab(); }
  // Q to open FAB quickly (only when not typing in an input)
  const tag = document.activeElement?.tagName;
  const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || document.activeElement?.isContentEditable;
  if (e.key === 'q' && !e.metaKey && !e.ctrlKey && !isTyping) { e.preventDefault(); openFab(); }
});

// ── PULL TO REFRESH ──
(function() {
  const THRESHOLD = 80;
  let startY = 0, pulling = false, refreshing = false;
  const indicator = document.getElementById('ptrIndicator');
  const spinner   = document.getElementById('ptrSpinner');
  const content   = document.getElementById('contentArea');

  document.addEventListener('touchstart', e => {
    if (refreshing) return;
    startY = e.touches[0].clientY;
    pulling = (content?.scrollTop ?? 0) === 0;
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!pulling || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { pulling = false; return; }
    const offset = Math.min(dy * 0.5, 56);
    indicator.style.transform = `translateY(${offset - 56}px)`;
    spinner.style.transform = `rotate(${Math.min(dy / THRESHOLD, 1) * 360}deg)`;
  }, { passive: true });

  document.addEventListener('touchend', async e => {
    if (!pulling || refreshing) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    if (dy < THRESHOLD) {
      indicator.style.transform = 'translateY(-56px)';
      return;
    }
    refreshing = true;
    indicator.style.transform = 'translateY(0)';
    spinner.style.animation = 'ptr-spin 0.6s linear infinite';
    await loadTasks();
    await loadProjects();
    renderSidebar(); renderContent(); updateNavCounts();
    indicator.style.transition = 'transform 0.3s ease';
    indicator.style.transform  = 'translateY(-56px)';
    setTimeout(() => { spinner.style.animation = ''; refreshing = false; }, 300);
  });
})();
