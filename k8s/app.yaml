apiVersion: apps/v1
kind: Deployment
metadata:
  name: td
  namespace: td
spec:
  replicas: 1
  selector:
    matchLabels:
      app: td
  template:
    metadata:
      labels:
        app: td
    spec:
      containers:
        - name: td
          image: ghcr.io/mvaldes14/task-manager:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: postgresql://td:$(POSTGRES_PASSWORD)@postgres:5432/td
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: POSTGRES_PASSWORD
            - name: TD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: TD_USERNAME
            - name: TD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: TD_PASSWORD
            - name: TD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: TD_API_KEY
            - name: GCAL_CREDENTIALS_JSON
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: GCAL_CREDENTIALS_JSON
            - name: GCAL_CALENDAR_ID
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: GCAL_CALENDAR_ID
            - name: OBSIDIAN_VAULT
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: OBSIDIAN_VAULT
            - name: OBSIDIAN_INBOX
              valueFrom:
                secretKeyRef:
                  name: td-secrets
                  key: OBSIDIAN_INBOX
          readinessProbe:
            httpGet:
              path: /auth/status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/status
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: td
  namespace: td
spec:
  selector:
    app: td
  ports:
    - port: 80
      targetPort: 5000
